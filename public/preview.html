<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预览文档</title>
    <!-- 引入 marked.js 渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <!-- 引入 highlight.js 用于代码高亮 -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css"></noscript>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js" defer></script>
    
    <!-- 优化字体加载：增加 preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入外部字体，增加设计感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* 引入本地微软雅黑字体 */
        @font-face {
            font-family: 'Local Microsoft YaHei';
            src: url('./fonts/msyh.ttc') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-color: #42b983; /* docsify default green */
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --border-color: #eaecef;
        }

        body {
            /* 优先使用本地引入的微软雅黑字体 */
            font-family: 'Local Microsoft YaHei', 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.8; /* 进一步增加行高，提升阅读体验 */
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center; /* 居中显示 */
            height: 100vh; /* 固定页面高度 */
            overflow: hidden; /* 禁止外层滚动 */
            /* 优化字体渲染抗锯齿 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            height: 85vh; /* 中间盒子固定高度 */
            overflow-y: auto; /* 允许中间内容滚动 */
            
            /* 隐藏滚动条 */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* 隐藏 Chrome, Safari and Opera 的滚动条 */
        .container::-webkit-scrollbar {
            display: none;
        }

        .nav-header {
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .back-btn::before {
            content: '←';
            margin-right: 5px;
        }

        .title {
            color: #999;
            font-size: 0.9em;
        }

        /* Markdown Styles similar to github/docsify */
        .markdown-body {
            font-size: 16px;
            word-wrap: break-word;
        }
        
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #2c3e50;
        }
        
        .markdown-body h1 { font-size: 2em; padding-bottom: .3em; border-bottom: 1px solid var(--border-color); }
        .markdown-body h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid var(--border-color); }
        
        .markdown-body p, .markdown-body blockquote, .markdown-body ul, .markdown-body ol, .markdown-body dl, .markdown-body table, .markdown-body pre, .markdown-body details {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .markdown-body blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
        }

        .markdown-body a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .markdown-body code {
            padding: .2em .4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27,31,35,.05);
            border-radius: 3px;
            /* 使用引入的 Fira Code 等宽字体 */
            font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
        }
        
        .markdown-body pre {
            word-wrap: normal;
            background-color: #f6f8fa;
            border-radius: 3px;
            padding: 16px;
            overflow: auto;
            line-height: 1.45;
            position: relative; /* 为复制按钮提供定位基准 */
        }
        
        /* 复制按钮样式 */
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            font-size: 12px;
            color: #6a737d;
            background-color: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease-in-out;
            font-family: inherit;
        }
        
        .markdown-body pre:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            color: #24292e;
            background-color: #f3f4f6;
            border-color: #d1d5da;
        }

        .copy-btn.copied {
            color: #28a745;
            border-color: #28a745;
        }
        
        .markdown-body pre code {
            display: inline;
            max-width: auto;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }
        
        .markdown-body img {
            max-width: 100%;
            box-sizing: content-box;
            background-color: #fff;
        }
        
        .markdown-body table {
            display: block;
            width: 100%;
            overflow: auto;
            border-spacing: 0;
            border-collapse: collapse;
        }
        
        .markdown-body table th, .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }
        
        .markdown-body table tr {
            background-color: #fff;
            border-top: 1px solid #c6cbd1;
        }
        
        .markdown-body table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        #content {
            min-height: 200px;
        }
        
        .loading {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        
        .error {
            color: #e74c3c;
            background: #fdf0ed;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <a href="index.html" class="back-btn">返回目录</a>
            <span class="title" id="doc-title"></span>
        </div>
        <div id="content" class="markdown-body">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 获取 URL 参数中的 file 路径
            const params = new URLSearchParams(window.location.search);
            const filePath = params.get('file');
            
            if (!filePath) {
                document.getElementById('content').innerHTML = '<div class="error">未指定文件路径</div>';
                return;
            }

            // 更新标题显示当前文件名
            const fileName = filePath.split('/').pop().replace(/\.md$/, '');
            document.getElementById('doc-title').textContent = fileName;
            document.title = fileName + ' - 预览';

            // 配置 marked.js
            marked.setOptions({
                highlight: function(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                gfm: true,
                breaks: true
            });

            // 获取 markdown 内容
            // 构建相对于当前目录的路径，以适应 GitHub Pages
            // 我们假设 content 文件夹会被复制到 public/ 目录下
            const fileUrl = './content/' + encodeURIComponent(filePath).replace(/%2F/g, '/');

            fetch(fileUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.text();
                })
                .then(markdown => {
                    // 使用 marked 渲染 HTML
                    const htmlContent = marked.parse(markdown);
                    document.getElementById('content').innerHTML = htmlContent;
                    
                    // 修正图片路径，因为图片可能在 markdown 的相对目录下
                    // 在渲染后的 HTML 中，我们需要处理所有非绝对路径的图片
                    const images = document.getElementById('content').querySelectorAll('img');
                    // fileUrl 包含了 encodeURIComponent 处理过的路径，我们需要构造正确的图片 URL
                    // 例如: filePath = 'Web/HTML/1-网页基础信息.md' -> basePath = '/content/Web/HTML/'
                    const pathParts = filePath.split('/');
                    pathParts.pop(); // 移除文件名
                    const basePath = '/content/' + (pathParts.length > 0 ? pathParts.join('/') + '/' : '');
                    
                    images.forEach(img => {
                        // 开启原生图片懒加载
                        img.setAttribute('loading', 'lazy');
                        
                        let src = img.getAttribute('src');
                        if (src && !src.startsWith('http') && !src.startsWith('/')) {
                            // 对于相对路径，我们需要先将其与当前目录拼接
                            
                            // 如果是以 ./ 开头，去掉它
                            if (src.startsWith('./')) {
                                src = src.substring(2);
                            }
                            
                            // 注意：由于 markdown 文件中的图片路径可能原本就包含 URL 编码（比如 `%20` 等）
                            // 或者是未编码的中文等字符。我们需要确保它们最终被正确请求。
                            // 更简单且不易出错的方法是：直接拼接路径，然后让浏览器自己去处理编码
                            // 但由于我们的后端需要解码（decodeURIComponent），我们在这里统一手动对各部分进行编码
                            
                            // 将 src 按照 / 分割，对每一部分先解码再编码（防止已经被编码过的部分被二次编码）
                            const encodedSrcParts = src.split('/').map(part => {
                                try {
                                    return encodeURIComponent(decodeURIComponent(part));
                                } catch (e) {
                                    return encodeURIComponent(part);
                                }
                            });
                            const encodedSrc = encodedSrcParts.join('/');
                            
                            // 同样处理 basePath，改为相对路径
                            const encodedBasePathParts = pathParts.map(part => {
                                try {
                                    return encodeURIComponent(decodeURIComponent(part));
                                } catch (e) {
                                    return encodeURIComponent(part);
                                }
                            });
                            const encodedBasePath = './content/' + (encodedBasePathParts.length > 0 ? encodedBasePathParts.join('/') + '/' : '');
                            
                            img.src = encodedBasePath + encodedSrc;
                        }
                    });

                    // 为代码块添加复制按钮
                    const preElements = document.getElementById('content').querySelectorAll('pre');
                    preElements.forEach(pre => {
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.textContent = '复制';
                        
                        copyBtn.addEventListener('click', async () => {
                            // 获取内部的 code 元素内容
                            const codeBlock = pre.querySelector('code');
                            const textToCopy = codeBlock ? codeBlock.innerText : pre.innerText;
                            
                            try {
                                await navigator.clipboard.writeText(textToCopy);
                                copyBtn.textContent = '已复制!';
                                copyBtn.classList.add('copied');
                                
                                setTimeout(() => {
                                    copyBtn.textContent = '复制';
                                    copyBtn.classList.remove('copied');
                                }, 2000);
                            } catch (err) {
                                console.error('复制失败:', err);
                                copyBtn.textContent = '失败';
                            }
                        });
                        
                        pre.appendChild(copyBtn);
                    });
                })
                .catch(err => {
                    console.error('Error loading markdown:', err);
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            <h3>加载失败</h3>
                            <p>无法加载文件: ${filePath}</p>
                            <p>错误详情: ${err.message}</p>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
